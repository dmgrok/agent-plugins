<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Plugins — Discover the best AI agent plugins</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26A1;</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <meta name="description" content="Find, compare, and build your AI agent plugin stack. 1000+ curated plugins for Claude, Cursor, Copilot, and more.">
</head>
<body>
    <a href="#app" class="skip-link">Skip to content</a>
    <nav class="navbar" role="navigation" aria-label="Main navigation">
        <div class="nav-container">
            <a href="#" class="nav-brand" aria-label="Home">
                <div class="nav-logo-mark">
                    <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
                        <path d="M4 8a4 4 0 014-4h12a4 4 0 014 4v12a4 4 0 01-4 4H8a4 4 0 01-4-4V8z" fill="url(#nav-grad)"/>
                        <path d="M9 14h10M14 9v10" stroke="white" stroke-width="2" stroke-linecap="round"/>
                        <circle cx="14" cy="14" r="3" stroke="white" stroke-width="1.5" fill="none"/>
                        <defs><linearGradient id="nav-grad" x1="4" y1="4" x2="24" y2="24"><stop stop-color="#7C3AED"/><stop offset="1" stop-color="#F97316"/></linearGradient></defs>
                    </svg>
                </div>
                <span class="nav-title">Agent Plugins</span>
            </a>
            <div class="nav-links" role="menubar">
                <a href="#" class="nav-link" data-nav="discover" role="menuitem">Discover</a>
                <a href="#stacks" class="nav-link" data-nav="stacks" role="menuitem">Stacks</a>
                <a href="#plugins" class="nav-link" data-nav="plugins" role="menuitem">All Plugins</a>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="btn-icon" aria-label="Toggle dark mode">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
                <button class="btn-icon stack-nav-btn" id="nav-stack-btn" aria-label="View your stack" hidden>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 002 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>
                    <span class="stack-badge" id="stack-badge-count">0</span>
                </button>
                <a href="https://github.com/dmgrok/agent-plugins" class="btn-icon" aria-label="GitHub" target="_blank" rel="noopener">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
            </div>
        </div>
    </nav>

    <main id="app" class="app-container" role="main">
        <!-- Content injected by app.js -->
    </main>

    <!-- Plugin Detail Modal -->
    <div id="plugin-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title" hidden>
        <div class="modal-container">
            <div class="modal-header">
                <div class="modal-header-left">
                    <h2 id="modal-title" class="modal-title"></h2>
                    <p id="modal-subtitle" class="modal-subtitle"></p>
                </div>
                <button class="modal-close" aria-label="Close modal">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <!-- Stack Drawer -->
    <div id="stack-drawer" class="stack-drawer" aria-label="Your plugin stack" hidden>
        <div class="stack-drawer-header">
            <h3>Your Stack</h3>
            <div class="stack-drawer-actions">
                <button class="btn-export-stack" id="btn-export-stack">Export</button>
                <button class="stack-drawer-close" id="stack-drawer-close" aria-label="Close">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
            </div>
        </div>
        <div class="stack-drawer-body" id="stack-drawer-body"></div>
        <div class="stack-drawer-footer" id="stack-drawer-footer"></div>
    </div>

    <footer class="site-footer">
        <p>Agent Plugins &middot; <a href="https://github.com/dmgrok/agent-plugins" target="_blank" rel="noopener">GitHub</a> &middot; <a href="https://github.com/dmgrok/agent-plugins/issues" target="_blank" rel="noopener">Submit a Plugin</a></p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
